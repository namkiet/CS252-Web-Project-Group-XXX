<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} {% endblock %}</title>

    <!-- Base CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Caprasimo&family=Jaro:opsz@6..72&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Pacifico&family=Winky+Sans:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">

    <!-- Extra CSS -->
    {% block extra_css %} {% endblock %}
</head>
<body>
    {% include 'components/_navbar.html' %}

    {% block content %}
    <main>
        <p>...</p>
    </main>
    {% endblock %}

    <footer>
        <p>&copy; 2025 My Website</p>
    </footer>

    <!-- Base JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{url_for('static', filename='js/global.js') }}"></script>

    <!-- Extra JS -->
     {% block extra_js %}{% endblock %}
</body>
</html>
