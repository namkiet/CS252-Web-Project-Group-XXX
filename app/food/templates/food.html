{% extends 'base.html' %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="{{ url_for('food_bp.static', filename='css/food.css') }}">
<style>
    #map {
        position: absolute;
        height: calc(100vh - 85px);
        width: 100%;
        z-index: 1;
    }
</style>

{% endblock %}

{% block content %}
<div id="map"></div>

<main class="container-fluid">
    <div class="row g-0 map-layout-wrapper">

        <aside class="col-lg-0">
            <div class="left-taskbar" id="date-taskbar">
                
                <div class="controls-taskbar">
                    <div class="control-item-taskbar-date" id="addDay">+</div>
                    <div class="control-item-taskbar-date" id="removeDay">–</div>
                </div>
            </div>
        </aside>
        <aside class="col-lg-2">

            <div class="sidebar-wrapper">

                <div class="sidebar-header p-3">
                    <h4 class="m-0">YOUR SCHEDULE</h4>
                </div>

                <div class="sidebar-content p-3">
                    <div id="meal-button-template" class="add-meal-button dropend">
                        <button class="btn-add-meal" type="button" aria-expanded="false" title="Add a meal">
                            <i class="bi bi-plus-circle-fill"></i>
                        </button>
                    </div>
                </div>
            
                <div id="sidebar-action-bar">
                </div>

            </div>

        </aside>

        <aside class="col-lg-6">
            <div id="meal-list-wrapper">
                
                <div class="p-2 border-bottom">
                    <div class="input-group">
                        <input type="text" id="meal-search-input" class="form-control form-control-sm" placeholder="Specify your requirements...">
                        <button id="meal-search-button" class="btn btn-primary btn-sm" type="button">OK</button>
                    </div>
                </div>

                <div id="meal-list-items" class="list-group" style="overflow-y: auto; flex-grow: 1;">
                    </div>
            </div>
        </aside>

    </div>
</main>

<div id="template-container" style="display: none;">

    <ul id="meal-dropdown-template" class="dropdown-menu add-meal-menu">
        <li><a class="dropdown-item" data-meal-type="Breakfast" href="#">Breakfast</a></li>
        <li><a class="dropdown-item" data-meal-type="Lunch" href="#">Lunch</a></li>
        <li><a class="dropdown-item" data-meal-type="Dinner" href="#">Dinner</a></li>
        <li><a class="dropdown-item" data-meal-type="JunkFood" href="#">Junk Food</a></li>
    </ul>

    <div id="sidebar-footer-template" class="sidebar-footer p-2 d-flex justify-content-between">
        <button class="btn btn-sm btn-outline-secondary" title="Add above">
            <i class="bi bi-arrow-up-circle"></i> +
        </button>
        <button class="btn btn-sm btn-outline-secondary" title="Add below">
            <i class="bi bi-arrow-down-circle"></i> +
        </button>
        <button class="btn btn-sm btn-outline-info" title="Change selected item">
            <i class="bi bi-pencil-square"></i>
        </button>
        <button class="btn btn-sm btn-outline-danger" title="Delete selected item">
            <i class="bi bi-trash"></i>
        </button>
    </div>

</div>

<div id="meal-list"></div>

{% block extra_js %}
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
