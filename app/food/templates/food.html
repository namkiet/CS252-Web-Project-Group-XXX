{% extends 'base.html' %}

{% block extra_css %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('food_bp.static', filename='css/food.css') }}">
{% endblock %}

{% block content %}
<main class="container-fluid">
    <div class="row g-0 map-layout-wrapper">
        <aside class="col-lg-2">

            <div class="sidebar-wrapper">

                <div class="sidebar-header p-3">
                    <h4 class="m-0">YOUR SCHEDULE</h4>
                </div>

                <div class="sidebar-content p-3">
                    <div id="meal-button-template" class="add-meal-button">
                        <button class="btn-add-meal" type="button" aria-expanded="false" title="Add a meal">
                            <i class="bi bi-plus-circle-fill"></i>
                        </button>
                    </div>
                </div>
            
                <div id="sidebar-action-bar">
                </div>

            </div>

        </aside>

        <aside class="col-lg-10">
            <div id="meal-list-wrapper" class="list-group" style="max-width: 50%; max-height: 400px; overflow-y: auto; display: none;">
                <!-- Các món ăn sẽ được append ở đây -->
            </div>
        </aside>
    </div>
</main>

<div id="template-container" style="display: none;">

    <ul id="meal-dropdown-template" class="dropdown-menu add-meal-menu">
        <li><a class="dropdown-item" data-meal-type="Breakfast" href="#">Breakfast</a></li>
        <li><a class="dropdown-item" data-meal-type="Lunch" href="#">Lunch</a></li>
        <li><a class="dropdown-item" data-meal-type="Dinner" href="#">Dinner</a></li>
        <li><a class="dropdown-item" data-meal-type="JunkFood" href="#">Junk Food</a></li>
    </ul>

    <div id="sidebar-footer-template" class="sidebar-footer p-2 d-flex justify-content-between">
        <button class="btn btn-sm btn-outline-secondary" title="Thêm mục phía trên">
            <i class="bi bi-arrow-up-circle"></i> +
        </button>
        <button class="btn btn-sm btn-outline-secondary" title="Thêm mục phía dưới">
            <i class="bi bi-arrow-down-circle"></i> +
        </button>
        <button class="btn btn-sm btn-outline-info" title="Thay đổi mục đã chọn">
            <i class="bi bi-pencil-square"></i>
        </button>
        <button class="btn btn-sm btn-outline-danger" title="Xóa mục đã chọn">
            <i class="bi bi-trash"></i>
        </button>
    </div>

</div>

<div id="meal-list"></div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('food_bp.static', filename='js/food.js') }}"></script>
<script src="{{ url_for('food_bp.static', filename='js/food-query.js') }}"></script>
{% endblock %}
