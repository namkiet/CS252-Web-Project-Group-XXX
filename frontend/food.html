<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset = "UTF-8">
  <meta name = "viewport" content = "width = device - width, initial-scale = 1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!--CSS of Google Fonts and Bootstrap-->
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Caprasimo&family=Jaro:opsz@6..72&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Pacifico&family=Winky+Sans:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!--CSS of Home-Page-->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/food.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    #map {
      position: absolute;
      height: calc(100vh - 85px);
      width: 100%;
      z-index: 1;
    }
  </style>

  <title>Food - LocalFood</title>
</head>
<body>
    <header id="navbar-placeholder"></header>
    <div id="map"></div>

    <main class="container-fluid">
        <div class="row g-0 map-layout-wrapper">
            <aside class="col-lg-2">

                <div class="sidebar-wrapper">

                    <div class="sidebar-header p-3">
                        <h4 class="m-0">YOUR SCHEDULE</h4>
                    </div>

                    <div class="sidebar-content p-3">
                        <div id="meal-button-template" class="add-meal-button dropend">
                            <button class="btn-add-meal" type="button" aria-expanded="false" title="Add a meal">
                                <i class="bi bi-plus-circle-fill"></i>
                            </button>
                        </div>
                    </div>
                
                    <div id="sidebar-action-bar">
                    </div>

                </div>

            </aside>

            <aside class="col-lg-10">
                <div id="meal-list-wrapper" class="list-group" style="max-width: 50%; max-height: 400px; overflow-y: auto; display: none;">

                </div>
            </aside>

        </div>
    </main>

    <div id="template-container" style="display: none;">

        <ul id="meal-dropdown-template" class="dropdown-menu add-meal-menu">
            <li><a class="dropdown-item" data-meal-type="Breakfast" href="#">Breakfast</a></li>
            <li><a class="dropdown-item" data-meal-type="Lunch" href="#">Lunch</a></li>
            <li><a class="dropdown-item" data-meal-type="Dinner" href="#">Dinner</a></li>
            <li><a class="dropdown-item" data-meal-type="JunkFood" href="#">Junk Food</a></li>
        </ul>

        <div id="sidebar-footer-template" class="sidebar-footer p-2 d-flex justify-content-between">
            <button class="btn btn-sm btn-outline-secondary" title="Thêm mục phía trên">
                <i class="bi bi-arrow-up-circle"></i> +
            </button>
            <button class="btn btn-sm btn-outline-secondary" title="Thêm mục phía dưới">
                <i class="bi bi-arrow-down-circle"></i> +
            </button>
            <button class="btn btn-sm btn-outline-info" title="Thay đổi mục đã chọn">
                <i class="bi bi-pencil-square"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" title="Xóa mục đã chọn">
                <i class="bi bi-trash"></i>
            </button>
        </div>

    </div>

    <div id="meal-list"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script type="module" src="js/about.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/global.js"></script>
    <script src="js/food.js"></script>
    <script src="js/food-query.js"></script>
</body>
