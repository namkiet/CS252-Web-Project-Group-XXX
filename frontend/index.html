<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset = "UTF-8">
  <meta name = "viewport" content = "width = device - width, initial-scale = 1.0">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!--CSS of Google Fonts and Bootstrap-->
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Caprasimo&family=Jaro:opsz@6..72&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Pacifico&family=Winky+Sans:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!--CSS of Home-Page-->
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/home.css">

  <title>Home - LocalFood</title>
</head>
<body>
  <!--Navigation; navbar-custom css in global.css-->
  <nav class="navbar navbar-expand-lg navbar-custom" data-bs-theme="dark">
    <div class="container">
      <a class="navbar-brand" href='index.html'>
        <img src="/assets/images/new-removebg.png" alt="LocalFood" width="143" height="55">
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item px-3">
            <a class="nav-link divider-vertical" href="#"></a>
          </li>
          <li class="nav-item px-4">
            <a class="nav-link active" href="index.html">HOME</a>
          </li>
          <li class="nav-item px-4">
            <a class="nav-link" href="#">FOOD</a>
          </li>
          <li class="nav-item px-4">
            <a class="nav-link" href="#">ATTRACTION</a>
          </li>
          <li class="nav-item px-4">
            <a class="nav-link" href="about.html">ABOUT</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <!--Carousel Slide, id: homeCarousel-->
  <div id="homeCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="4000">
    <div class="carousel-indicators">
      <button type="button" data-bs-target="#homeCarousel" data-bs-slide-to="0" class="active"
        aria-current="true" area-label="Slide 1"></button>
      <button type="button" data-bs-target="#homeCarousel" data-bs-slide-to="1" area-label="Slide 2"></button>
      <button type="button" data-bs-target="#homeCarousel" data-bs-slide-to="2" area-label="Slide 3"></button>
    </div>
    
    <div class="carousel-inner">
      <div class="carousel-item active"> <!--Active for the first slide, we use d-block w-100 to scale 100% width-->
        <img src="/assets/images/slide1.jpg" class="d-block w-100" alt="Slide 1">
      </div>

      <div class="carousel-item">
        <img src="/assets/images/slide2.jpg" class="d-block w-100" alt="Slide 2">
      </div>

      <div class="carousel-item">
        <img src="/assets/images/slide3.jpg" class="d-block w-100" alt="Slide 3">
      </div>
    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#homeCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Previous</span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#homeCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Next</span>
    </button>

    <div class="static-caption">
      <h1>LOCAL FOOD: YOUR PERSONAL FOOD JOURNEY</h1>
      <p>Explore Vietnamese dishes just steps away. Just tell us what you're craving.</p>
    
      <a href="#" class="btn btn-warning btn-lg mt-3">
        Let's make your tour!! >
      </a>
    </div>

  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
